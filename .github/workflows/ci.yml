name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.11
      - run: uv pip install --system -e ".[dev,harness,fallback]"
      - run: ruff check src tests
      - run: mypy src
      - run: pytest -v
